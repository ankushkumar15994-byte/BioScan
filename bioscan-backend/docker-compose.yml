version: '3.8'

services:
  backend:
    build: .
    ports:
      - "8000:8000"
    volumes:
      # Mount the current directory to /app for hot-reloading
      - .:/app
      # Mount Kaggle credentials so the training script can download the dataset
      - ~/.kaggle:/root/.kaggle
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
